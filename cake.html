<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="A birthday cake just for you." />
  <title>Ton Gâteau 🎂</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Inter:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Background Layers -->
  <div class="bg-static" aria-hidden="true"></div>
  <div class="bg-sparkle" aria-hidden="true">
    <span class="sparkle-dot"></span><span class="sparkle-dot"></span>
    <span class="sparkle-dot"></span><span class="sparkle-dot"></span>
    <span class="sparkle-dot"></span><span class="sparkle-dot"></span>
    <span class="sparkle-dot"></span><span class="sparkle-dot"></span>
    <span class="sparkle-dot"></span><span class="sparkle-dot"></span>
    <span class="sparkle-dot"></span><span class="sparkle-dot"></span>
  </div>
  <div class="petals-container" id="petals-container" aria-hidden="true"></div>

  <!-- Page progress dots -->
  <nav class="page-progress" aria-label="Page navigation">
    <a href="index.html" class="dot" aria-label="Page 1: Welcome"></a>
    <a href="text.html" class="dot" aria-label="Page 2: Song"></a>
    <span class="dot dot--active" aria-label="Page 3: Cake"></span>
    <span class="dot" aria-label="Page 4: Letter"></span>
    <span class="dot" aria-label="Page 5: Surprise"></span>
  </nav>
  <main class="page-wrapper page-wrapper--card">
    <div class="glass-card page-card animate-enter">
      <div class="card-tag"><span>🎂</span> Fais un vœu</div>
      <h1 class="card-title">Ton Gâteau</h1>
      <p class="card-lead">
        Joyeux Anniversaire ! Souffle les bougies et fais un vœu.
      </p>

      <div class="chibi-scene" aria-label="Birthday Cake">
         <div class="hero-hearts" aria-hidden="true" style="text-align: center; margin: 2rem 0;">
          <span id="birthday-cake" class="spotlight-active" style="font-size: 11.25rem; display: inline-block; line-height: 1;">🎂</span>
         </div>
      </div>

      <div style="text-align: center; margin-bottom: 24px; position: relative; z-index: 102;">
         <button id="btn-make-wish" class="btn-wish">Souffle la bougie et fais un vœu 🌬️</button>
      </div>

      <!-- Navigation -->
      <div class="card-nav">
        <a href="text.html" class="btn-back" aria-label="Retour">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <path d="M19 12H5M11 6l-6 6 6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span>Retour</span>
        </a>
        <a href="letter.html" class="btn-next" aria-label="Surprise suivante">
          <span>Suivant</span>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <path d="M5 12h14M13 6l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </a>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
