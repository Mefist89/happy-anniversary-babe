<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="description" content="One last surprise — just you and me." />
    <title>Toi &amp; Moi 🌟</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Inter:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Background Layers -->
    <div class="bg-static" aria-hidden="true"></div>
    <div class="bg-sparkle" aria-hidden="true">
      <span class="sparkle-dot"></span><span class="sparkle-dot"></span>
      <span class="sparkle-dot"></span><span class="sparkle-dot"></span>
      <span class="sparkle-dot"></span><span class="sparkle-dot"></span>
      <span class="sparkle-dot"></span><span class="sparkle-dot"></span>
      <span class="sparkle-dot"></span><span class="sparkle-dot"></span>
      <span class="sparkle-dot"></span><span class="sparkle-dot"></span>
    </div>
    <div
      class="petals-container"
      id="petals-container"
      aria-hidden="true"
    ></div>

    <!-- Page progress dots -->
    <nav class="page-progress" aria-label="Page navigation">
      <a href="index.html" class="dot" aria-label="Page 1: Welcome"></a>
      <a href="text.html" class="dot" aria-label="Page 2: Song"></a>
      <a href="cake.html" class="dot" aria-label="Page 3: Cake"></a>
      <a href="letter.html" class="dot" aria-label="Page 4: Letter"></a>
      <span class="dot dot--active" aria-label="Page 5: Surprise"></span>
    </nav>

    <main class="page-wrapper page-wrapper--card">
      <div class="glass-card page-card animate-enter">
        <div class="card-tag"><span>🌟</span> Une dernière surprise</div>
        <h1 class="card-title">Toi &amp; Moi</h1>
        <p class="card-lead">
          Une toute dernière surprise... Rien que nous deux, avec tes baskets
          Adidas Denim que tu aimes tant. 👟
        </p>

        <!-- Chibi couple display -->
        <div
          class="chibi-scene"
          id="chibi-scene"
          aria-label="Chibi couple illustration"
        >
          <div class="chibi-character chibi-character--girl">
            <img src="img/p2f.png" alt="Chibi Irene in Paris" />
          </div>
          <div class="chibi-heart-center" aria-hidden="true">
            <span class="chibi-heart">💛</span>
          </div>
          <div class="chibi-character chibi-character--boy">
            <img src="img/p1m.png" alt="Chibi Eugen" />
          </div>
        </div>

        <!-- Video players -->
        <div class="videos-container" style="margin-top: 16px">
          <div id="video-tab-1" class="video-wrapper">
            <div class="video-container">
              <video
                playsinline
                preload="metadata"
                controls
                aria-label="Special video surprise"
              >
                <source src="video/m1.mp4" type="video/mp4" />
                Your browser does not support the video tag.
              </video>
            </div>
          </div>

          <div id="video-tab-2" class="video-wrapper" style="display: none">
            <div class="video-container">
              <video
                playsinline
                preload="metadata"
                controls
                aria-label="Special video surprise"
              >
                <source src="video/m2.mp4" type="video/mp4" />
                Your browser does not support the video tag.
              </video>
            </div>
          </div>
        </div>

        <div class="video-tabs">
          <button class="video-tab-btn is-active" data-target="video-tab-1">
            Video 1
          </button>
          <button class="video-tab-btn" data-target="video-tab-2">
            Video 2
          </button>
        </div>

        <!-- Navigation -->
        <div class="card-nav">
          <a href="letter.html" class="btn-back" aria-label="Retour">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
              <path
                d="M19 12H5M11 6l-6 6 6 6"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
            <span>Retour</span>
          </a>
          <a
            href="index.html"
            class="btn-next btn-next--end"
            aria-label="Depuis le début"
          >
            <span>Depuis le début</span>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
              <path
                d="M17 12H3M9 6l-6 6 6 6M21 5v14"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </a>
        </div>
      </div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
